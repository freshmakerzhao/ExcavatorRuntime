common:
  msg_source: 1
  send_packet_ros: false
  send_point_cloud_ros: true
lidar:
  - driver:
      lidar_type: RSAIRY

      msop_port: 6699
      difop_port: 7788
      imu_port: 6688
      user_layer_bytes: 0
      tail_layer_bytes: 0

      min_distance: 0.5
      # Keep the driver-side distance gate aligned with the mapping profile.
      max_distance: 35
      use_lidar_clock: true
      dense_points: false

      ts_first_point: true

      start_angle: 0
      end_angle: 360

      pcap_repeat: true
      pcap_rate: 1.0
      pcap_path: /home/robosense/lidar.pcap

    ros:
      ros_frame_id: rslidar
      ros_recv_packet_topic: /rslidar_packets
      ros_send_packet_topic: /rslidar_packets
      ros_send_imu_data_topic: /rslidar_imu_data
      ros_send_point_cloud_topic: /rslidar_points
      ros_queue_length: 100
