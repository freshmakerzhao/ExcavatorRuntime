excavator_tf_node:
  ros__parameters:
    publish_rate_hz: 30.0
    publish_map_to_base: true

    frames:
      map: fk_root
      unity: machine_root
      base: base_link
      swing: swing_link
      boom: boom_link
      arm: arm_link
      bucket: bucket_link
      tip: bucket_tip

    joint_names:
      swing: swing_joint
      boom: boom_joint
      arm: arm_joint
      bucket: bucket_joint

    # All lengths are meters. Replace these with CAD or measured dimensions.
    geometry:
      # fk_root原点与machine_root重合，但轴向保持ROS/FK约定。
      # 这里填写的是base_link原点在fk_root/ROS坐标系下的实测坐标。
      map_to_base_xyz: [-0.06, 0.0, -0.18]
      map_to_base_rpy: [0.0, 0.0, 0.0]

      # base_link origin to swing_link origin.
      base_to_swing_xyz: [0.0, 0.0, 0.0]

      # swing_link origin to boom root joint frame.
      swing_to_boom_xyz: [0.05, 0.0, 0.0]

      # boom root joint to arm joint, expressed along boom_link X.
      boom_to_arm_xyz: [0.78, 0.0, 0.0]

      # arm joint to bucket joint, expressed along arm_link X.
      arm_to_bucket_xyz: [0.35, 0.0, 0.0]

      # bucket joint to bucket tooth center, expressed in bucket_link.
      bucket_to_tip_xyz: [0.2, 0.0, 0.0]
      # RPY order is [roll_x, pitch_y, yaw_z], radians.
      bucket_to_tip_rpy: [0.0, 0.87, 0.0]

    # Joint angle zero offsets, radians.
    # Use these to align encoder zero with the kinematic model zero.
    angle_offsets:
      swing: 0.0
      boom: 0.52
      arm: 3.14
      bucket: 3.66

    # Sensor/Orin angle sign to FK sign.
    # 当前实测：swing、boom、arm 的电位计正方向与FK正方向相反；bucket保持一致。
    joint_signs:
      swing: -1.0
      boom: -1.0
      arm: -1.0
      bucket: -1.0
